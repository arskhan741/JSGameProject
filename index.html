<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>3D Box Opening Animation</title>
    <script></script>
  </head>
  <body>
    <div class="container" id="initial_box">
      <div class="box" id="box">
        <div class="front">🎁</div>
        <div class="back" id="loot">
          🎉 Looting Please Wait . . .!
          <div id="reward_detail"></div>
        </div>
        <div class="left"></div>
        <div class="right"></div>
        <div class="top"></div>
        <div class="bottom"></div>
      </div>
      <button id="continue_Btn" class="hidden">Continue</button>
    </div>

    <div class="app">
      <div class="img-container" id="gift-box">
        <img class="kuku" src="images/jump-character.png" alt="kuku" />
        <button class="box1" id="animateButton">
          <img src="images/box.png" alt="box" />
        </button>
        <img class="lid" id="boxLid" src="images/box-lid.png" alt="box-lid" />
      </div>
      <div id="confetti"></div>
    </div>

    <div id="continueSection">
      <div id="continueText">Click on next Button to follow</div>
      <button id="nextBtn">Continue</button>
    </div>

    <div id="rewardDetails" class="hidden">
      <div id="rewardName"></div>
    </div>

    <script type="module" src="index.js"></script>
  </body>
</html>
